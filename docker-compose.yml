# Local development infrastructure: PostgreSQL + Redis.
# Variable substitution is read from the project .env file automatically.
#
#   npm run docker:up      # start in background
#   npm run docker:down    # stop
#   npm run docker:logs    # tail logs

services:
  postgres:
    image: postgres:16-alpine
    container_name: enterprise_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_db}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-enterprise_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: enterprise_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # The app itself. Opt-in via the `app` profile so the default
  # `docker compose up` still brings up only infra for local dev:
  #   docker compose --profile app up -d --build
  app:
    build:
      context: .
      target: runner
    image: enterprise-app:latest
    container_name: enterprise_app
    profiles: ['app']
    restart: unless-stopped
    env_file: .env
    environment:
      # These override env_file: force prod logging + reach infra by service
      # name (not localhost) inside the compose network.
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-enterprise_db}?schema=public
      REDIS_HOST: redis
    ports:
      - '${PORT:-8000}:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD', 'wget', '-qO-', 'http://localhost:8000/api/v1/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
